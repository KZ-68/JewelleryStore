name: security

on:
  pull_request:
    branches:
      - test

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '22.20.0'
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    
    steps:
        - name: Checkout code
          uses: actions/checkout@v6
          with:
            fetch-depth: 0

        - name: Setup PHP
          uses: shivammathur/setup-php@v2
          with:
            php-version: 8.4
            extensions: dom, ctype, curl, xml, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath, soap, intl, gd, exif, iconv, filter, json
        - name: Get Composer Cache Directory
          id: composer-cache
          run: |
            echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        - uses: actions/cache@v4
          with:
            path: ${{ steps.composer-cache.outputs.dir }}
            key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
            restore-keys: |
              ${{ runner.os }}-composer-
        - name: Install PHP dependencies
          run: composer install --no-progress --prefer-dist --optimize-autoloader
        - name: Run critical vulnerability check
          run: |
            composer audit --format=json > audit.json
            if grep -q '"severity":"critical"' audit.json; then
              echo "Critical vulnerability found!"
              exit 1
            fi
        - name: Analyze code quality
          run: |
            echo "## Analyse de la Pull Request" >> pr_analysis.md
            echo "" >> pr_analysis.md

            if [ -s audit.json ]; then
              echo "Vulnérabilités détectées :" >> pr_analysis.md
              cat audit.json >> pr_analysis.md
            else
              echo "Aucune vulnérabilité détectée" >> pr_analysis.md
            fi
            
            # Compter les fichiers modifiés
            FILES_CHANGED=$(git diff --name-only origin/main...HEAD | wc -l)
            echo "- **Fichiers modifiés:** $FILES_CHANGED" >> pr_analysis.md
            
            # Compter les lignes ajoutées/supprimées
            LINES_STATS=$(git diff --stat origin/main...HEAD | tail -1)
            echo "- **Statistiques:** $LINES_STATS" >> pr_analysis.md
            
            if [ -f ".php-cs-fixer.php" ]; then
              echo "- Standards de code vérifiés" >> pr_analysis.md
            fi
        - name: Comment PR
          uses: actions/github-script@v7
          with:
            github-token: ${{ secrets.GITHUB_TOKEN }}
            script: |
              const fs = require('fs');

              const analysis = fs.readFileSync('pr_analysis.md', 'utf8');

              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });

              const botComment = comments.data.find(c =>
                c.body.includes('Composer Security Audit')
              );

              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: analysis
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: analysis
                });
              }