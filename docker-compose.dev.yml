services:
    app:
      build:
        context: .
        target: frankenphp_dev
      container_name: laravel_app
      image: dunglas/frankenphp
      networks:
        - laravel_app
      ports:
        - '80:80'
        - '443:443'
        - ${VITE_PORT:-5173}:${VITE_PORT:-5173}
      healthcheck:
        disable: true
      volumes:
        - ./:/root/JewelleryStore:rw
        - ./vendor:/vendor
        - caddy_data:/data
        - caddy_config:/config
        - ./frankenphp/Caddyfile:/etc/caddy/Caddyfile:ro
        - ./frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro
        - ./logs:/var/log/frankenphp
        - ./frankenphp/hosts:/etc/caddy/hosts
      cap_add:
          - NET_BIND_SERVICE
      tty: true
      depends_on:
          - mysql
      environment:
          APP_ENV: dev
          APP_DEBUG: 'true'
          APP_URL: 'http://localhost:8000'
          SANCTUM_STATEFUL_DOMAINS: localhost
          SESSION_DOMAIN: localhost
          DB_HOST: ${DB_HOST}
          DB_PORT: ${DB_PORT}
          DB_DATABASE: ${DB_DATABASE}
          DB_USERNAME: ${DB_USERNAME}
          DB_PASSWORD: ${DB_PASSWORD}
    mysql:
      image: 'mysql:8.0'
      restart: always
      ports:
        - 3306:3306
      environment:
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
        MYSQL_DATABASE: ${DB_DATABASE}
        MYSQL_USER: ${DB_USERNAME}
        MYSQL_PASSWORD: ${DB_PASSWORD}
        MYSQL_ROOT_HOST: '%'
      healthcheck:
        test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
        timeout: 40s
        retries: 5
        start_period: 120s
      volumes:
        - db_data:/var/lib/mysql
      networks:
        - laravel_app
    phpmyadmin:
      image: phpmyadmin/phpmyadmin
      restart: always
      depend_on:
        - mysql
      ports:
        - "8081:80"
      environment:
        PMA_HOST: mysql
        PMA_ARBITRARY: 0
        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      networks:
          - laravel_app
    rabbitmq:
      image: rabbitmq:3.9-management
      depends_on:
        - app
      ports:
      - '5672:5672'
      - '15672:15672'
      networks:
        - laravel_app
networks:
    laravel_app:
        driver: bridge
volumes:
    db_data:
    caddy_data:
    caddy_config:
    sail-mysql:
      driver: local
